version: 2
updates:
  # GitHub Actions used by the build workflow.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "@me"
    assignees:
      - "@me"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"

  # NuGet packages referenced by the two plugin projects (RocketMod + redist).
  - package-ecosystem: "nuget"
    directories:
      - "/Publicized"
      - "/NonPublicized"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "@me"
    assignees:
      - "@me"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "nuget"
    allow:
      - dependency-type: "direct"
    ignore:
      # Both projects are pinned to the SAME game build so the publicized-vs-not
      # contrast stays apples-to-apples. Bump these two by hand, together.
      - dependency-name: "RocketModFix.Unturned.Redist.Server"
      - dependency-name: "RocketModFix.Unturned.Redist.Server.Publicized"
